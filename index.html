<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scripture Breaker - Break the Word, Learn the Word</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✝</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="game-wrapper">
    <div id="game-container">
      <canvas id="game-canvas"></canvas>
    </div>
    <aside id="sidebar">
      <div class="sidebar-brand">
        <img src="/cdbs-logo.png" alt="CDBS" class="sidebar-logo-img" />
        <div class="sidebar-title">CDBS</div>
        <div class="sidebar-subtitle">Color & Draw<br/>Bible Study</div>
      </div>
      <div class="sidebar-divider"></div>
      <a id="yt-link" class="sidebar-video" href="https://www.youtube.com/@CartoonForChrist" target="_blank" rel="noopener">
        <div class="yt-icon">▶</div>
        <div class="yt-label">Watch CDBS<br/>on YouTube</div>
        <div id="yt-title" class="yt-title">CartoonForChrist</div>
      </a>
      <div class="sidebar-divider"></div>
      <div class="sidebar-legend">
        <div class="legend-title">POINTS</div>
        <div class="legend-row"><span class="legend-dot" style="background:#F5A623"></span><span class="legend-pts" style="color:#F5A623">+150</span></div>
        <div class="legend-row"><span class="legend-dot" style="background:#4CAF50"></span><span class="legend-pts" style="color:#4CAF50">+100</span></div>
        <div class="legend-row"><span class="legend-dot" style="background:#7B1FA2"></span><span class="legend-pts" style="color:#7B1FA2">+80</span></div>
        <div class="legend-row"><span class="legend-dot" style="background:#90A4AE"></span><span class="legend-pts" style="color:#90A4AE">+50</span></div>
        <div class="legend-row"><span class="legend-dot" style="background:#8D6E63"></span><span class="legend-pts" style="color:#8D6E63">+40</span></div>
        <div class="legend-row"><span class="legend-dot" style="background:#2196F3"></span><span class="legend-pts" style="color:#2196F3">+25</span></div>
        <div class="legend-row"><span class="legend-dot" style="background:#E53E3E"></span><span class="legend-pts" style="color:#E53E3E">-120</span></div>
      </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-stats">
        <div class="stat-label">Memorized</div>
        <div id="memorized-count" class="stat-value">0</div>
      </div>
    </aside>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
